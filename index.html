<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jun 的幣圈活動整理</title>
<meta name="description" content="護理師下班後用 AI 整理的幣圈活動，我玩過的才分享。純個人分享，非投資建議。">
<!-- 分享到 LINE / Threads / IG 時的預覽卡 -->
<meta property="og:title" content="Jun 的幣圈活動整理 🌸">
<meta property="og:description" content="護理師下班後用 AI 整理的幣圈活動，我玩過的才分享。純個人分享，非投資建議。">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ffe0eb">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <!-- 背景層：漸層 / 光暈 / 點陣 / 區塊鏈節點 / 噪點 -->
  <div class="hero-bg" aria-hidden="true"></div>
  <div class="hero-blob b1" aria-hidden="true"></div>
  <div class="hero-blob b2" aria-hidden="true"></div>
  <div class="hero-blob b3" aria-hidden="true"></div>
  <div class="hero-blob b4" aria-hidden="true"></div>
  <div class="hero-grid" aria-hidden="true"></div>
  <svg class="hero-net" viewBox="0 0 560 230" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <g stroke-linecap="round">
      <line x1="60" y1="40" x2="150" y2="90"/>
      <line x1="150" y1="90" x2="90" y2="170"/>
      <line x1="150" y1="90" x2="280" y2="60"/>
      <line x1="280" y1="60" x2="410" y2="100"/>
      <line x1="410" y1="100" x2="500" y2="48"/>
      <line x1="410" y1="100" x2="470" y2="180"/>
      <line x1="280" y1="60" x2="300" y2="160"/>
    </g>
    <circle class="nd" cx="60"  cy="40"  r="3"   style="animation-delay:0s"/>
    <circle class="nd" cx="150" cy="90"  r="3.6" style="animation-delay:.5s"/>
    <circle class="nd" cx="90"  cy="170" r="2.6" style="animation-delay:1s"/>
    <circle class="nd" cx="280" cy="60"  r="3.4" style="animation-delay:1.4s"/>
    <circle class="nd" cx="410" cy="100" r="3.6" style="animation-delay:.8s"/>
    <circle class="nd" cx="500" cy="48"  r="2.8" style="animation-delay:1.8s"/>
    <circle class="nd" cx="470" cy="180" r="2.6" style="animation-delay:.3s"/>
    <circle class="nd" cx="300" cy="160" r="2.8" style="animation-delay:1.2s"/>
  </svg>
  <div class="hero-grain" aria-hidden="true"></div>

  <!-- 內容 -->
  <div class="hero-inner">
    <div class="hero-kicker">✦&nbsp; CRYPTO <b>·</b> AI <b>·</b> 自由生活 &nbsp;✦</div>
    <div class="avatar-wrap">
      <div class="avatar-ring" aria-hidden="true"></div>
      <div class="avatar" id="site-emoji" role="img" aria-label="Jun logo">
        <svg class="logo-mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ff7eb3"/>
              <stop offset=".5" stop-color="#c98bff"/>
              <stop offset="1" stop-color="#6fb8ff"/>
            </linearGradient>
          </defs>
          <g stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round">
            <line x1="24" y1="24" x2="24" y2="9"/>
            <line x1="24" y1="24" x2="37.5" y2="19.5"/>
            <line x1="24" y1="24" x2="33" y2="36"/>
            <line x1="24" y1="24" x2="15" y2="36"/>
            <line x1="24" y1="24" x2="10.5" y2="19.5"/>
          </g>
          <g fill="url(#logoGrad)">
            <circle cx="24" cy="9" r="4"/>
            <circle cx="37.5" cy="19.5" r="4"/>
            <circle cx="33" cy="36" r="4"/>
            <circle cx="15" cy="36" r="4"/>
            <circle cx="10.5" cy="19.5" r="4"/>
          </g>
          <circle cx="24" cy="24" r="5.2" fill="#fff" stroke="url(#logoGrad)" stroke-width="2.4"/>
        </svg>
      </div>
      <span class="orbit-dot" aria-hidden="true"></span>
    </div>
    <h1 class="name" id="site-name">Jun 的幣圈活動整理 🌸</h1>
    <p class="tagline" id="site-tagline"></p>
    <div class="disclaimer" id="site-disclaimer"></div>
    <nav class="header-links" id="site-links"></nav>
  </div>
</header>

<div class="filter-wrap" id="filters"></div>

<div class="cards" id="cards"></div>

<div class="no-results" id="no-results">這個平台目前沒有活動 🌸</div>

<div class="footer" id="site-footer"></div>

<div class="toast" id="toast">🌸 已複製！</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  // 套用網站基本資訊
  const S = window.SITE || {};
  if (S.emoji) document.getElementById("site-emoji").textContent = S.emoji;
  if (S.name) {
    document.getElementById("site-name").textContent = S.name;
    document.title = S.name;
  }
  document.getElementById("site-tagline").innerHTML = S.tagline || "";
  document.getElementById("site-disclaimer").textContent = S.disclaimer || "";
  document.getElementById("site-footer").innerHTML = S.footer || "";

  const linksEl = document.getElementById("site-links");
  linksEl.innerHTML = (S.links || [])
    .filter(l => l && l.url)
    .map(l => `<a class="header-link" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`)
    .join("");

  // 畫卡片 + 篩選
  const cards = document.getElementById("cards");
  const noResults = document.getElementById("no-results");
  const data = window.ACTIVITIES || [];
  renderCards(cards, data);
  buildFilters(document.getElementById("filters"), data, (type) => applyFilter(cards, noResults, type));
</script>
</body>
</html>
